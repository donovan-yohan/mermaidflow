app = 'mermaidflow-server'
primary_region = 'sjc'

[build]
  dockerfile = 'apps/server/Dockerfile'

[env]
  PORT = '4000'
  DATA_DIR = '/data/mermaidflow'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'mermaidflow_data'
  destination = '/data'
