version: 5
sandbox:
  user: sandbox
  group: sandbox
  work_dir: /workspace
  runtime_dir: /run/agent
  artifact_outbox: /run/agent/outbox
  read_only_paths:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /var/log
    - /app
  read_write_paths:
    - /tmp
    - /workspace
    - /run/agent
    - /run/agent/outbox
  masked_paths:
    - /proc/kcore
    - /proc/latency_stats
    - /proc/timer_list
    - /sys/firmware
  tmpfs_paths:
    - /tmp
process:
  seccomp_profile: ./etc/seccomp-default.json
  no_new_privileges: true
  drop_capabilities: ['ALL']
  memory_limit: 2048m
  pids_limit: 512
  cpu_quota: 200000
  read_only_rootfs: true
ebpf:
  enabled: false
  tool: bpftrace
  monitor_connect: true
  monitor_exec: true
  output_dir: .runtime/ebpf

network:
  mode: proxy
  proxy_listen: 3128
  allow_http: false
  providers:
    github: true
    npm: true
    anthropic_api: true
  localhost: []
